<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- set the theme class before first paint; theme.ts owns it after mount -->
		<script>
			const themePreference = localStorage.getItem("waferdetect-theme");
			document.documentElement.classList.toggle(
				"dark",
				themePreference === "light"
					? false
					: themePreference === "system"
						? window.matchMedia("(prefers-color-scheme: dark)").matches
						: true,
			);
		</script>

		<title>WaferDetect — Wafer-Map Defect Intelligence</title>
		<meta
			name="description"
			content="AI-powered wafer-map defect intelligence for semiconductor fabs — detects and segments failure patterns, diagnoses root causes, and quantifies yield loss in dollars." />
		<meta name="theme-color" content="#070b12" />

		<link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="/assets/WaferDetectIcon192.png" />
		<link rel="apple-touch-icon" href="/assets/WaferDetectIcon192.png" />
		<link rel="manifest" href="/manifest.json" />

		<meta property="og:type" content="website" />
		<meta
			property="og:title"
			content="WaferDetect — Wafer-Map Defect Intelligence" />
		<meta
			property="og:description"
			content="AI-powered wafer-map defect intelligence for semiconductor fabs — detects and segments failure patterns, diagnoses root causes, and quantifies yield loss in dollars." />
		<meta property="og:image" content="/assets/WaferDetectIcon512.png" />
		<meta name="twitter:card" content="summary" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
