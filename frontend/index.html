<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Set the theme class before first paint -->
		<script>
			const themePreference = localStorage.getItem("waferdetect-theme");
			document.documentElement.classList.toggle(
				"dark",
				themePreference === "dark" ||
					(themePreference === "system" &&
						window.matchMedia("(prefers-color-scheme: dark)").matches),
			);
		</script>

		<title>WaferDetect — Wafer-Map Defect Intelligence</title>
		<meta
			name="description"
			content="WaferDetect is an AI-powered wafer-map defect intelligence platform for semiconductor fabs that segments failure patterns in silicon wafers, diagnoses their root causes and potential errors in the manufacturing process, and quantifies the wafer-map die yield loss in dollars." />
		<meta name="theme-color" content="#eef1f6" />

		<link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="/assets/WaferDetectIcon192.png" />
		<link rel="apple-touch-icon" href="/assets/WaferDetectIcon192.png" />
		<link rel="manifest" href="/manifest.json" />

		<meta property="og:type" content="website" />
		<meta
			property="og:title"
			content="WaferDetect — Wafer-Map Defect Intelligence" />
		<meta
			property="og:description"
			content="WaferDetect is an AI-powered wafer-map defect intelligence platform for semiconductor fabs that segments failure patterns in silicon wafers, diagnoses their root causes and potential errors in the manufacturing process, and quantifies the wafer-map die yield loss in dollars." />
		<meta property="og:image" content="/assets/WaferDetectIcon512.png" />
		<meta name="twitter:card" content="summary" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
