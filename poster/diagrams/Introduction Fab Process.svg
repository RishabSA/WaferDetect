<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 430" width="1254" height="430" font-family="Calibri, Arial, sans-serif">
	<!-- Step 1: polished wafer -->
	<rect x="10" y="24" width="222" height="380" rx="16" fill="#ffffff" stroke="#c3ced9" stroke-width="1.5"/>
	<circle cx="40" cy="52" r="15" fill="#0e7490"/>
	<text x="40" y="58" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
	<circle cx="121" cy="170" r="78" fill="#dbe4ee" stroke="#8fa3bb" stroke-width="2.5"/>
	<circle cx="121" cy="248" r="8" fill="#ffffff" stroke="#8fa3bb" stroke-width="2.5"/>
	<text x="121" y="350" font-size="21" font-weight="700" fill="#16202e" text-anchor="middle">Polished wafer</text>
	<text x="121" y="378" font-size="15" fill="#55637a" text-anchor="middle">enters the fab · 300 mm</text>

	<!-- arrow 1 -->
	<rect x="233" y="165" width="15" height="10" fill="#0e7490"/>
	<polygon points="248,156 262,170 248,184" fill="#0e7490"/>

	<!-- Step 2: process steps -->
	<rect x="262" y="24" width="222" height="380" rx="16" fill="#ffffff" stroke="#c3ced9" stroke-width="1.5"/>
	<circle cx="292" cy="52" r="15" fill="#0e7490"/>
	<text x="292" y="58" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
	<rect x="288" y="78" width="170" height="40" rx="8" fill="#eef4f9" stroke="#b9c9d8"/>
	<text x="373" y="104" font-size="16.5" fill="#24435c" text-anchor="middle">Lithography</text>
	<rect x="288" y="128" width="170" height="40" rx="8" fill="#e2ecf4" stroke="#b9c9d8"/>
	<text x="373" y="154" font-size="16.5" fill="#24435c" text-anchor="middle">Etch</text>
	<rect x="288" y="178" width="170" height="40" rx="8" fill="#eef4f9" stroke="#b9c9d8"/>
	<text x="373" y="204" font-size="16.5" fill="#24435c" text-anchor="middle">Polish (CMP)</text>
	<rect x="288" y="228" width="170" height="40" rx="8" fill="#e2ecf4" stroke="#b9c9d8"/>
	<text x="373" y="254" font-size="16.5" fill="#24435c" text-anchor="middle">Thermal</text>
	<text x="373" y="350" font-size="21" font-weight="700" fill="#16202e" text-anchor="middle">Process steps ×100s</text>
	<text x="373" y="378" font-size="15" fill="#55637a" text-anchor="middle">weeks in the cleanroom</text>

	<!-- arrow 2 -->
	<rect x="485" y="165" width="15" height="10" fill="#0e7490"/>
	<polygon points="500,156 514,170 500,184" fill="#0e7490"/>

	<!-- Step 3: every die tested -->
	<rect x="514" y="24" width="222" height="380" rx="16" fill="#ffffff" stroke="#c3ced9" stroke-width="1.5"/>
	<circle cx="544" cy="52" r="15" fill="#0e7490"/>
	<text x="544" y="58" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
	<clipPath id="waferClip">
		<circle cx="625" cy="170" r="77"/>
	</clipPath>
	<circle cx="625" cy="170" r="78" fill="#dbe4ee" stroke="#8fa3bb" stroke-width="2.5"/>
	<g clip-path="url(#waferClip)" stroke="#8fa3bb" stroke-width="1.5">
		<line x1="570" y1="92" x2="570" y2="248"/>
		<line x1="592" y1="92" x2="592" y2="248"/>
		<line x1="614" y1="92" x2="614" y2="248"/>
		<line x1="636" y1="92" x2="636" y2="248"/>
		<line x1="658" y1="92" x2="658" y2="248"/>
		<line x1="680" y1="92" x2="680" y2="248"/>
		<line x1="547" y1="115" x2="703" y2="115"/>
		<line x1="547" y1="137" x2="703" y2="137"/>
		<line x1="547" y1="159" x2="703" y2="159"/>
		<line x1="547" y1="181" x2="703" y2="181"/>
		<line x1="547" y1="203" x2="703" y2="203"/>
		<line x1="547" y1="225" x2="703" y2="225"/>
	</g>
	<text x="625" y="350" font-size="21" font-weight="700" fill="#16202e" text-anchor="middle">Every die tested</text>
	<text x="625" y="378" font-size="15" fill="#55637a" text-anchor="middle">electrical probe · pass / fail</text>

	<!-- arrow 3 -->
	<rect x="737" y="165" width="15" height="10" fill="#0e7490"/>
	<polygon points="752,156 766,170 752,184" fill="#0e7490"/>

	<!-- Step 4: WaferDetect (real image placeholder) -->
	<rect x="766" y="24" width="222" height="380" rx="16" fill="#ffffff" stroke="#7cc0d4" stroke-width="2"/>
	<circle cx="796" cy="52" r="15" fill="#0e7490"/>
	<text x="796" y="58" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
	<rect x="782" y="78" width="190" height="190" rx="12" fill="#f4f8fb" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="8 6"/>
	<text x="877" y="164" font-size="15" font-weight="700" fill="#0e7490" text-anchor="middle">Drop in the annotated</text>
	<text x="877" y="186" font-size="15" font-weight="700" fill="#0e7490" text-anchor="middle">wafer PNG here</text>
	<text x="877" y="353" font-size="30" font-weight="700" text-anchor="middle"><tspan fill="#16202e">Wafer</tspan><tspan fill="#0e7490">Detect</tspan></text>
	<text x="877" y="378" font-size="15" fill="#55637a" text-anchor="middle">AI reads the failure pattern</text>

	<!-- arrow 4 -->
	<rect x="989" y="165" width="15" height="10" fill="#0e7490"/>
	<polygon points="1004,156 1018,170 1004,184" fill="#0e7490"/>

	<!-- Step 5: fix the process -->
	<rect x="1018" y="24" width="222" height="380" rx="16" fill="#ffffff" stroke="#c3ced9" stroke-width="1.5"/>
	<circle cx="1048" cy="52" r="15" fill="#0e7490"/>
	<text x="1048" y="58" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
	<circle cx="1129" cy="170" r="78" fill="#dbe4ee" stroke="#8fa3bb" stroke-width="2.5"/>
	<circle cx="1129" cy="248" r="8" fill="#ffffff" stroke="#8fa3bb" stroke-width="2.5"/>
	<circle cx="1104" cy="150" r="2.5" fill="#16202e"/>
	<circle cx="1152" cy="195" r="2.5" fill="#16202e"/>
	<circle cx="1137" cy="128" r="2.5" fill="#16202e"/>
	<circle cx="1190" cy="105" r="20" fill="#059669"/>
	<path d="M1180 105 l7 8 l14 -17" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
	<text x="1129" y="350" font-size="21" font-weight="700" fill="#16202e" text-anchor="middle">Fix the process</text>
	<text x="1129" y="378" font-size="15" fill="#55637a" text-anchor="middle">corrected tool · higher yield</text>
</svg>
